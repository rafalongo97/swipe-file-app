<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- Image Placeholder Gradient -->
    <linearGradient id="imageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Swipe Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1" />
      <stop offset="60%" stop-color="#2563eb" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="1" />
    </linearGradient>

    <!-- Drop Shadow for Cards -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <filter id="cardShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="4" dy="10" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- Back Card -->
  <rect x="120" y="130" width="220" height="280" rx="24" fill="#f8fafc" stroke="#e2e8f0" stroke-width="4" filter="url(#shadow)" />
  <rect x="120" y="130" width="220" height="280" rx="24" fill="#94a3b8" opacity="0.08" />

  <!-- Middle Card -->
  <g transform="translate(230, 270) rotate(5) translate(-110, -140)">
    <rect x="0" y="0" width="220" height="280" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <rect x="24" y="24" width="172" height="90" rx="8" fill="#f1f5f9" />
    <rect x="24" y="134" width="120" height="12" rx="4" fill="#cbd5e1" />
    <rect x="24" y="156" width="172" height="8" rx="3" fill="#e2e8f0" />
    <rect x="24" y="174" width="150" height="8" rx="3" fill="#e2e8f0" />
  </g>

  <!-- Front Card (Swiped Card) -->
  <g transform="translate(290, 245) rotate(15) translate(-110, -140)">
    <rect x="0" y="0" width="220" height="280" rx="24" fill="url(#cardGrad)" filter="url(#cardShadow)" />
    <rect x="24" y="24" width="172" height="90" rx="8" fill="url(#imageGrad)" />
    
    <!-- Mini folder symbol inside card image space -->
    <path d="M100 50 L108 58 L124 42" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95" />

    <rect x="24" y="134" width="120" height="12" rx="4" fill="#ffffff" opacity="0.95" />
    <rect x="24" y="156" width="172" height="8" rx="3" fill="#ffffff" opacity="0.6" />
    <rect x="24" y="174" width="150" height="8" rx="3" fill="#ffffff" opacity="0.6" />
    <rect x="24" y="192" width="100" height="8" rx="3" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- Swipe Arrow Motion Line -->
  <path d="M 70 320 Q 140 420 330 400 T 435 240" fill="none" stroke="url(#arrowGrad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Arrow Head -->
  <path d="M 420 252 L 438 234 L 442 258 Z" fill="#1d4ed8" />
</svg>
